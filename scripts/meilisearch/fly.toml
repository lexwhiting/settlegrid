app = "settlegrid-meilisearch"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  MEILI_ENV = "production"
  MEILI_NO_ANALYTICS = "true"

[http_service]
  internal_port = 7700
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "meili_data"
  destination = "/meili_data"
